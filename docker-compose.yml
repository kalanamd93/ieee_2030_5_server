version: "3.9"

services:
  ieee2030-server:
    build: .
    container_name: ieee2030_5_server
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/tm')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.ieee2030.description=IEEE 2030.5 SEP 2.0 Test Server"
